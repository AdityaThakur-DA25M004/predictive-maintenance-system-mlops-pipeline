[pytest]
# ============================================================
# pytest configuration — predictive maintenance
# ============================================================
# Why this file exists
# --------------------
# Without testpaths, pytest walks the entire project tree looking for
# test_*.py / *_test.py files. On Windows, that walk hits Airflow's
# `latest` symlink at `airflow/logs/scheduler/latest` which Windows
# cannot follow (raises WinError 1920), aborting the whole test run
# during collection.
#
# Setting `testpaths = tests` scopes collection to that directory only,
# which is where all our tests live anyway. norecursedirs gives a
# belt-and-braces guarantee in case someone runs pytest with explicit
# args that bypass testpaths.
# ============================================================

testpaths = tests

# Belt-and-braces: even if someone invokes `pytest path/that/expands/wide`,
# pytest will still skip these directories.
norecursedirs =
    airflow
    .dvc
    .git
    .pytest_cache
    .venv
    venv
    mlruns
    mlartifacts
    data
    models
    logs
    docker
    docs
    htmlcov
    __pycache__
    node_modules

# Standard test file discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Quieter output: don't show the full pytest header on every run; do
# show summary of failures + skipped tests.
addopts =
    -ra
    --strict-markers
    --tb=short

# Filter the noisy Pydantic v1 deprecation warnings emitted by MLflow's
# bundled code. These are MLflow's responsibility, not yours, and they
# clutter the test output. Other deprecation warnings still surface.
filterwarnings =
    ignore::DeprecationWarning:mlflow.*
    ignore::PendingDeprecationWarning:mlflow.*
    ignore:.*PydanticDeprecatedSince.*:DeprecationWarning
