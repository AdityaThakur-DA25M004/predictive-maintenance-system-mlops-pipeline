# Configuration for Predictive Maintenance System
project:
  name: "Predictive Maintenance System"
  version: "1.0.0"

data:
  raw_path: "data/raw/ai4i2020.csv"
  processed_dir: "data/processed"
  baselines_path: "data/baselines/drift_baselines.json"
  test_size: 0.2
  random_state: 42

features:
  numeric:
    - "Air temperature [K]"
    - "Process temperature [K]"
    - "Rotational speed [rpm]"
    - "Torque [Nm]"
    - "Tool wear [min]"
  categorical:
    - "Type"
  target: "Machine failure"
  failure_types:
    - "TWF"
    - "HDF"
    - "PWF"
    - "OSF"
    - "RNF"

model:
  algorithm: "RandomForest"
  hyperparameters:
    n_estimators: [100, 200]
    max_depth: [10, null]
    min_samples_split: [2, 5]
    class_weight: ["balanced"]
  metrics:
    - "f1_score"
    - "precision"
    - "recall"
    - "roc_auc"
    - "accuracy"

mlflow:
  tracking_uri: "http://mlflow:5000"
  experiment_name: "predictive-maintenance"
  model_name: "predictive-maintenance-model"

api:
  host: "0.0.0.0"
  port: 8000
  latency_threshold_ms: 200

monitoring:
  drift_threshold: 0.05
  error_rate_threshold: 0.05
  retraining_trigger: "drift_detected"

docker:
  frontend_port: 8501
  backend_port: 8000
  mlflow_port: 5000
  prometheus_port: 9090
  grafana_port: 3000
  airflow_port: 8080
