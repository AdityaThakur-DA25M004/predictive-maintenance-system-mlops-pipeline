# Docker Compose OVERRIDE — MLflow Models Serve sidecar (v2)

services:
  mlflow-serve:
    build:
      context: .
      dockerfile: docker/mlflow-serve/Dockerfile
    container_name: pm-mlflow-serve
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_TRACKING_USERNAME: ${MLFLOW_TRACKING_USERNAME:-}
      MLFLOW_TRACKING_PASSWORD: ${MLFLOW_TRACKING_PASSWORD:-}

      GUNICORN_CMD_ARGS: "--timeout=300 --keep-alive=10 --graceful-timeout=30"
    command: >
      mlflow models serve
        -m models:/predictive-maintenance-model/latest
        -h 0.0.0.0
        -p 5001
        --env-manager=local
    ports:
      - "5001:5001"
    depends_on:
      mlflow:
        condition: service_healthy
    healthcheck:

      test: ["CMD", "curl", "-fsS", "http://localhost:5001/ping"]
      interval: 30s
      timeout: 10s
      retries: 5

      start_period: 90s
    restart: unless-stopped
    networks: [pm-net]