# =============================================================================
# Prometheus Alert Rules for Predictive Maintenance System
# =============================================================================
# Covers: error rate >5%, data drift, latency SLO, model quality, feedback
# accuracy, training lifecycle, alert-pipeline self-monitoring.
#
# Mounted into the prometheus container at:
#   /etc/prometheus/alert_rules.yml  (read-only)
#
# Reload after editing without restart (requires --web.enable-lifecycle):
#   curl -X POST http://localhost:9090/-/reload
# =============================================================================

groups:
  - name: api_availability
    interval: 30s
    rules:
      - alert: APIDown
        expr: up{job="predictive-maintenance-api"} == 0
        for: 1m
        labels:
          severity: critical
          component: api
        annotations:
          summary: "Predictive Maintenance API is DOWN"
          description: "The FastAPI backend has been unreachable for more than 1 minute."

      - alert: ModelNotLoaded
        # Original was `absent(model_f1_score) or model_f1_score == 0`, which
        # fires for ~30s on every API restart because the gauge defaults to 0
        # before _load_artifacts() runs. Adding a 5m grace period removes the
        # restart-flap without compromising signal — a real "no model" outage
        # will persist much longer than that.
        expr: model_f1_score == 0
        for: 5m
        labels:
          severity: critical
          component: model
        annotations:
          summary: "Model is not loaded or F1 is zero"
          description: >
            model_f1_score has been 0 for 5+ minutes. The API is up but no
            model artifacts have been loaded into memory. Check the training
            pipeline, MLflow registry, or POST /admin/reload-model.

  - name: api_performance
    interval: 30s
    rules:
      - alert: HighErrorRate
        # Assignment requirement: alert if error rate > 5%
        expr: |
          sum(rate(prediction_errors_total[5m]))
          /
          clamp_min(sum(rate(prediction_requests_total[5m])), 0.0001)
          > 0.05
        for: 2m
        labels:
          severity: critical
          component: api
          slo: error_rate
        annotations:
          summary: "Prediction error rate exceeds 5%"
          description: "Error rate is {{ $value | humanizePercentage }} over the last 5 minutes."

      - alert: ElevatedErrorRate
        expr: |
          sum(rate(prediction_errors_total[5m]))
          /
          clamp_min(sum(rate(prediction_requests_total[5m])), 0.0001)
          > 0.02
        for: 5m
        labels:
          severity: warning
          component: api
        annotations:
          summary: "Prediction error rate is elevated (>2%)"
          description: "Error rate is {{ $value | humanizePercentage }} — investigate before SLO breach."

      - alert: HighLatencyP95
        # Business SLO: inference latency < 200 ms
        expr: |
          histogram_quantile(0.95,
            sum(rate(prediction_latency_seconds_bucket[5m])) by (le)
          ) > 0.2
        for: 3m
        labels:
          severity: warning
          component: api
          slo: latency_p95
        annotations:
          summary: "p95 latency exceeds 200ms SLO"
          description: "p95 latency is {{ $value }}s — business SLO is 200ms."

      - alert: VeryHighLatencyP99
        expr: |
          histogram_quantile(0.99,
            sum(rate(prediction_latency_seconds_bucket[5m])) by (le)
          ) > 0.5
        for: 5m
        labels:
          severity: critical
          component: api
        annotations:
          summary: "p99 latency exceeds 500ms"
          description: "p99 latency is {{ $value }}s — severely degraded."

  - name: model_drift
    interval: 1m
    rules:
      - alert: DataDriftDetected
        # Assignment requirement: alert if data drift is detected
        expr: drift_detected == 1
        for: 5m
        labels:
          severity: warning
          component: model
        annotations:
          summary: "Data drift detected"
          description: "The drift detector has flagged drift. Consider retraining."

      - alert: MultipleFeaturesDrifted
        expr: drift_features_count >= 3
        for: 2m
        labels:
          severity: critical
          component: model
        annotations:
          summary: "3+ features exhibiting drift"
          description: "{{ $value }} features have drifted simultaneously — retrain urgently."

  - name: model_quality
    interval: 1m
    rules:
      - alert: ModelF1Degraded
        expr: model_f1_score < 0.5 and model_f1_score > 0
        for: 10m
        labels:
          severity: warning
          component: model
        annotations:
          summary: "Model F1 score below acceptance threshold (0.5)"
          description: "Current F1 is {{ $value }}. Trigger retraining."

      - alert: FeedbackAccuracyDegraded
        # Real-world performance decay (ground-truth feedback loop)
        expr: feedback_rolling_accuracy < 0.7 and feedback_rolling_accuracy > 0
        for: 15m
        labels:
          severity: warning
          component: model
          slo: feedback_accuracy
        annotations:
          summary: "Rolling feedback accuracy below 70%"
          description: "Live model accuracy from feedback is {{ $value | humanizePercentage }}."

  - name: retraining_activity
    interval: 1m
    rules:
      - alert: RetrainStorm
        # Guard against runaway automation triggering too many retrains
        expr: sum(increase(retrain_triggers_total[15m])) > 5
        for: 0m
        labels:
          severity: warning
          component: pipeline
        annotations:
          summary: "Excessive retraining triggers (>5 in 15 min)"
          description: "{{ $value }} retrain triggers in the last 15 minutes — check automation."

      - alert: ModelStale
        # No training run in the past 7 days.
        # Original guarded only by the threshold, but at fresh deploy
        # last_training_timestamp_seconds=0, so (time() - 0) is ~1.7e9 and the
        # rule fires immediately. Add `> 0` guard so it only evaluates after
        # the first training run actually completes.
        expr: |
          (time() - last_training_timestamp_seconds) > 604800
          and
          last_training_timestamp_seconds > 0
        for: 5m
        labels:
          severity: warning
          component: model
        annotations:
          summary: "Model has not been retrained in 7+ days"
          description: >
            Last training was {{ $value | humanizeDuration }} ago.
            Consider triggering a fresh run to incorporate new data.

      - alert: UploadSuccessRate
        # Catch systematic upload failures (>50% fail rate over 10 min)
        expr: |
          sum(rate(dataset_uploads_total{status="failed"}[10m]))
          /
          clamp_min(sum(rate(dataset_uploads_total[10m])), 0.0001)
          > 0.5
        for: 2m
        labels:
          severity: warning
          component: pipeline
        annotations:
          summary: "Dataset upload failure rate > 50%"
          description: "More than half of CSV uploads are being rejected — check data schema."

      - alert: TrainingDataSourceDefault
        # Original used `retrain_data_source == 0 and sum(retrain_triggers_total) > 0`
        # which fails to match because the gauge has no labels but sum() drops
        # them, leaving incompatible vector shapes.
        # Fix: use `on()` clause to explicitly match across the empty label set,
        # AND require recent retrain activity (not all-time) to avoid firing on
        # every fresh deploy where the gauge defaults to 0.
        expr: |
          retrain_data_source == 0
          and on()
          (sum(increase(retrain_triggers_total[1h])) > 0)
        for: 30m
        labels:
          severity: info
          component: pipeline
        annotations:
          summary: "Recent retraining used default dataset (no upload detected)"
          description: >
            A retrain was triggered in the last hour but trained on the default
            dataset. Upload a new CSV via /retrain/upload before triggering
            retrain to use fresh data.

  - name: alert_pipeline_self_monitoring
    interval: 1m
    rules:
      - alert: AlertEmailDispatchFailing
        # Detect when alerts are firing but emails are NOT going out.
        # If we accumulate 3+ "log-only" alerts and zero emails over 30m,
        # SMTP is misconfigured or broken.
        expr: |
          sum(increase(alert_notifications_total{channel="log"}[30m])) >= 3
          and on()
          sum(increase(alert_notifications_total{channel="email"}[30m])) == 0
        for: 1m
        labels:
          severity: warning
          component: alerting
        annotations:
          summary: "Alerts are firing but emails are not being sent"
          description: >
            {{ $value }} alerts logged in the last 30m but zero emails sent.
            Check ALERT_EMAIL_ENABLED, SMTP credentials, and the
            ALERT_RECIPIENT in your .env file.