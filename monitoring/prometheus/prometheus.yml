# Prometheus Scrape Configuration
# Mounted at: /etc/prometheus/prometheus.yml

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: predictive-maintenance-local
    environment: dev

rule_files:
  - "alert_rules.yml"

scrape_configs:
  # Scrape Prometheus itself
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Scrape the Predictive Maintenance FastAPI backend
  - job_name: "predictive-maintenance-api"
    metrics_path: /metrics
    scrape_interval: 10s
    scrape_timeout: 5s
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: api
          tier: backend

  # MLflow tracking server health (basic up/down)
  - job_name: "mlflow"
    metrics_path: /
    scrape_interval: 60s
    scrape_timeout: 5s
    static_configs:
      - targets: ["mlflow:5000"]
        labels:
          service: mlflow
          tier: tracking
