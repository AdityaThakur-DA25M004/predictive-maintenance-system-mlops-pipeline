# Prometheus scrape config for the Predictive Maintenance stack.
#
# Mounted into the prometheus container at:
#   /etc/prometheus/prometheus.yml  (read-only)
# via the docker-compose volume:
#   ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
#
# Job name MUST be "predictive-maintenance-api" — the Grafana dashboard
# (predictive_maintenance.json) targets `up{job="predictive-maintenance-api"}`
# in its API Status panel and several others rely on it implicitly.
#
# Targets use Docker service DNS (api:8000). Prometheus runs inside the
# pm-net network so it can resolve service names. Do NOT use localhost here.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: predictive-maintenance
    env: docker

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  # Prometheus scraping itself
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Predictive Maintenance FastAPI app — exposes /metrics
  - job_name: predictive-maintenance-api
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: predictive-maintenance-api
          component: api