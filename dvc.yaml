# DVC Pipeline Definition — predictive maintenance

stages:
  data_ingestion:
    cmd: python -m src.data_ingestion
    deps:
      - src/data_ingestion.py
      - src/utils.py
      - data/raw/ai4i2020.csv
      - data/feedback/uploads        # uploaded CSVs trigger re-run
      - configs/config.yaml
      - configs/config.local.yaml    # local override
    outs:
      - data/processed/train.csv
      - data/processed/test.csv

  drift_check:
    cmd: python -m src.drift_detection
    deps:
      - src/drift_detection.py
      - src/data_preprocessing.py    # uses engineer_features + get_feature_columns
      - src/utils.py
      - data/processed/test.csv
      - configs/config.yaml
      - configs/config.local.yaml
    outs:
      - data/baselines/drift_report.json
    metrics:
      - data/baselines/drift_summary.json:
          cache: false

  preprocessing:
    cmd: python -m src.data_preprocessing
    deps:
      - src/data_preprocessing.py
      - src/utils.py
      - data/processed/train.csv
      - data/processed/test.csv
      - configs/config.yaml
      - configs/config.local.yaml
    outs:
      - data/processed/train_processed.csv
      - data/processed/test_processed.csv
      - models/scaler.joblib
      - data/baselines/drift_baselines.json
      - data/baselines/ref_samples.json   # real reference samples for drift KS test

  training:
    cmd: python -m src.model_training
    deps:
      - src/model_training.py
      - src/data_preprocessing.py
      - src/utils.py
      - data/processed/train_processed.csv
      - data/processed/test_processed.csv
      - configs/config.yaml
      - configs/config.local.yaml
    outs:
      - models/best_model.joblib
      - models/classification_report.json
    metrics:
      - models/test_metrics.json:
          cache: false