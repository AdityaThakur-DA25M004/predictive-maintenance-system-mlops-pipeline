# ============================================================
# DVC Pipeline Definition — predictive maintenance
# ============================================================
# Both configs/config.yaml AND configs/config.local.yaml are listed
# as deps on every stage. The Python code reads only ONE of them at
# runtime (driven by PM_CONFIG_PATH env var), but DVC needs to track
# both files so editing either one triggers the right re-runs:
#
#   - In Docker:        config.local.yaml is unchanged, config.yaml drives
#   - Locally:          config.yaml is unchanged, config.local.yaml drives
#   - Either way:       DVC notices when EITHER file changes
#
# Listing both as deps doesn't cause spurious re-runs — DVC checks
# content hashes, so a file you didn't edit just keeps its old hash.
#
# Pipeline stages (matches the Airflow DAG order):
#   data_ingestion → drift_check → preprocessing → training
# ============================================================

stages:
  data_ingestion:
    cmd: python -m src.data_ingestion
    deps:
      - src/data_ingestion.py
      - src/utils.py
      - data/raw/ai4i2020.csv
      - data/feedback/uploads        # uploaded CSVs trigger re-run
      - configs/config.yaml
      - configs/config.local.yaml    # local override
    outs:
      - data/processed/train.csv
      - data/processed/test.csv

  # NEW: Runs BEFORE preprocessing so it compares the freshly-ingested
  # data against the PREVIOUS baselines on disk. After preprocessing
  # overwrites the baselines, this comparison is no longer meaningful —
  # which is exactly why drift_check has to run first. Mirrors the
  # ordering fix in ml_pipeline_dag.py.
  #
  # TWO output files (deliberate split):
  #
  #   - drift_report.json   (under `outs`):
  #       Full per-feature detail (10 features × 10 sub-metrics).
  #       Versioned via DVC cache. NOT surfaced as a metric because
  #       `dvc metrics show` flattens nested JSON and would print 100+
  #       rows of unreadable output.
  #
  #   - drift_summary.json  (under `metrics`, cache: false):
  #       Flat 5-key summary (overall_drift, n_drifted, n_total_features,
  #       drift_pct, reference_type). Surfaces cleanly in
  #       `dvc metrics show` and `dvc metrics diff`.
  #
  # The same physical file cannot appear under both `outs` and `metrics`
  # in the same stage (DVC raises "already specified in stage"), which
  # is why we write two physical files instead.
  drift_check:
    cmd: python -m src.drift_detection
    deps:
      - src/drift_detection.py
      - src/data_preprocessing.py    # uses engineer_features + get_feature_columns
      - src/utils.py
      - data/processed/test.csv
      - configs/config.yaml
      - configs/config.local.yaml
    outs:
      - data/baselines/drift_report.json
    metrics:
      - data/baselines/drift_summary.json:
          cache: false

  preprocessing:
    cmd: python -m src.data_preprocessing
    deps:
      - src/data_preprocessing.py
      - src/utils.py
      - data/processed/train.csv
      - data/processed/test.csv
      - configs/config.yaml
      - configs/config.local.yaml
    outs:
      - data/processed/train_processed.csv
      - data/processed/test_processed.csv
      - models/scaler.joblib
      - data/baselines/drift_baselines.json
      - data/baselines/ref_samples.json   # real reference samples for drift KS test

  training:
    cmd: python -m src.model_training
    deps:
      - src/model_training.py
      - src/data_preprocessing.py
      - src/utils.py
      - data/processed/train_processed.csv
      - data/processed/test_processed.csv
      - configs/config.yaml
      - configs/config.local.yaml
    outs:
      - models/best_model.joblib
      - models/classification_report.json
    metrics:
      - models/test_metrics.json:
          cache: false