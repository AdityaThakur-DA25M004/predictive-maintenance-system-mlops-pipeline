# ============================================================
# Predictive Maintenance — Docker Compose
# ============================================================
# Fixes applied:
#   1. Streamlit port mismatch → use 8501 EVERYWHERE
#   2. API/Airflow missing dill → added to requirements
#   3. MLflow PermissionError /mlflow → --serve-artifacts
#   4. NEW: Frontend external-tool URLs split into browser-facing
#      (http://localhost:<host_port>) vs Docker-internal
#      (http://<service>:<container_port>). Without this split,
#      st.link_button rendered links like http://airflow-webserver:8080
#      that the user's browser cannot resolve (DNS_PROBE_FINISHED_NXDOMAIN).
# ============================================================

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: docker/airflow/Dockerfile
  env_file: .env
  environment:
    AIRFLOW__CORE__EXECUTOR: ${AIRFLOW__CORE__EXECUTOR}
    AIRFLOW__CORE__LOAD_EXAMPLES: ${AIRFLOW__CORE__LOAD_EXAMPLES}
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session"
    MLFLOW_TRACKING_URI: http://mlflow:5000
    MLFLOW_TRACKING_USERNAME: ${MLFLOW_TRACKING_USERNAME:-}
    MLFLOW_TRACKING_PASSWORD: ${MLFLOW_TRACKING_PASSWORD:-}
    PROJECT_ROOT: /app
    PYTHONPATH: /opt/airflow:/app
    UPLOADS_DIR: /app/data/feedback/uploads
    DRIFT_REF_SAMPLES_PATH: /app/data/baselines/ref_samples.json
    # Used by task_reload_api_baselines to hot-reload baselines into the API
    # without requiring a container restart.
    API_INTERNAL_URL: http://api:8000
    RETRAIN_API_KEY: ${RETRAIN_API_KEY}
    DVC_REMOTE_NAME: ${DVC_REMOTE_NAME:-dagshub}
    DVC_REMOTE_URL: ${DVC_REMOTE_URL:-s3://dvc}
    DVC_REMOTE_ENDPOINT: ${DVC_REMOTE_ENDPOINT:-}
    DVC_ACCESS_KEY_ID: ${DVC_ACCESS_KEY_ID:-}
    DVC_SECRET_ACCESS_KEY: ${DVC_SECRET_ACCESS_KEY:-}
    DVC_AUTO_PUSH: ${DVC_AUTO_PUSH:-false}
    DAGSHUB_USERNAME: ${DAGSHUB_USERNAME:-}
    DAGSHUB_TOKEN: ${DAGSHUB_TOKEN:-}
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./src:/app/src
    - ./configs:/app/configs
    - ./data:/app/data
    # CRITICAL: feedback_data overrides ./data for /app/data/feedback only.
    # Mount this AFTER ./data:/app/data so it takes precedence.
    - feedback_data:/app/data/feedback
    - ./models:/app/models
    - ./scripts:/app/scripts
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15-alpine
    container_name: pm-postgres
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks: [pm-net]

  # ── MLflow ──────────────────────────────────────────────────
  mlflow:
    build:
      context: .
      dockerfile: docker/mlflow/Dockerfile
    container_name: pm-mlflow
    env_file: .env
    environment:
      MLFLOW_BACKEND_STORE_URI: sqlite:////mlflow/db/mlflow.db
      MLFLOW_DEFAULT_ARTIFACT_ROOT: /mlflow/artifacts
    ports:
      - "5000:5000"
    volumes:
      - mlflow_db:/mlflow/db
      - mlflow_artifacts:/mlflow/artifacts
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks: [pm-net]

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: pm-api
    env_file: .env
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      PYTHONPATH: /app
      RETRAIN_API_KEY: ${RETRAIN_API_KEY}
      CORS_ORIGINS: "http://localhost:${FRONTEND_PORT},http://frontend:8501"
      FEEDBACK_DB_PATH: /app/data/feedback/feedback.db
      FEEDBACK_WINDOW: "100"
      UPLOADS_DIR: /app/data/feedback/uploads
      DRIFT_REF_SAMPLES_PATH: /app/data/baselines/ref_samples.json
      AIRFLOW_API_URL: http://airflow-webserver:8080
      AIRFLOW_USERNAME: ${AIRFLOW_ADMIN_USERNAME}
      AIRFLOW_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD}
    ports:
      - "${API_PORT}:8000"
    volumes:
      - ./models:/app/models:ro
      - ./data/baselines:/app/data/baselines:ro
      - feedback_data:/app/data/feedback
      - ./configs:/app/configs:ro
    depends_on:
      mlflow:
        condition: service_healthy
    restart: unless-stopped
    networks: [pm-net]

  # ── Streamlit Frontend ──────────────────────────────────────
  # FIX 4: external-tool URLs split into BROWSER vs INTERNAL.
  # *_URL          → opened by user's browser → must use localhost + host port
  # *_INTERNAL_URL → used inside container by _is_reachable() health probe
  #                  → uses Docker DNS service name + container port
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: pm-frontend
    env_file: .env
    environment:
      # In-container HTTP (Streamlit → API)
      API_URL: http://api:8000

      # ── BROWSER-FACING URLs (rendered as st.link_button hrefs) ────
      API_BROWSER_URL: http://localhost:${API_PORT}
      MLFLOW_URL:      http://localhost:5000
      AIRFLOW_URL:     http://localhost:${AIRFLOW_PORT}
      GRAFANA_URL:     http://localhost:${GRAFANA_PORT}
      PROMETHEUS_URL:  http://localhost:${PROMETHEUS_PORT}

      # ── INTERNAL URLs (used by _is_reachable probe inside container) ──
      MLFLOW_INTERNAL_URL:     http://mlflow:5000
      AIRFLOW_INTERNAL_URL:    http://airflow-webserver:8080
      GRAFANA_INTERNAL_URL:    http://grafana:3000
      PROMETHEUS_INTERNAL_URL: http://prometheus:9090
    ports:
      # Same port both sides — no WebSocket pain
      - "${FRONTEND_PORT}:8501"
    volumes:
      - ./.streamlit/config.toml:/home/app/.streamlit/config.toml:ro
    depends_on:
      - api
    restart: unless-stopped
    networks: [pm-net]

  airflow-init:
    <<: *airflow-common
    container_name: pm-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        (airflow users create \
          --username "${AIRFLOW_ADMIN_USERNAME}" \
          --password "${AIRFLOW_ADMIN_PASSWORD}" \
          --firstname Admin --lastname User --role Admin \
          --email admin@example.com 2>/dev/null || true) &&
        airflow users reset-password \
          --username "${AIRFLOW_ADMIN_USERNAME}" \
          --password "${AIRFLOW_ADMIN_PASSWORD}"
    restart: "no"
    networks: [pm-net]

  airflow-webserver:
    <<: *airflow-common
    container_name: pm-airflow-web
    command: airflow webserver --port 8080
    ports:
      - "${AIRFLOW_PORT}:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || curl -fsS http://localhost:8080/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks: [pm-net]

  airflow-scheduler:
    <<: *airflow-common
    container_name: pm-airflow-scheduler
    command: airflow scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped
    networks: [pm-net]

  prometheus:
    image: prom/prometheus:v2.48.1
    container_name: pm-prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT}:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    networks: [pm-net]

  grafana:
    image: grafana/grafana:10.2.3
    container_name: pm-grafana
    env_file: .env
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT}:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    restart: unless-stopped
    networks: [pm-net]

networks:
  pm-net:
    driver: bridge

volumes:
  postgres_data:
  mlflow_db:
  mlflow_artifacts:
  feedback_data:
  prometheus_data:
  grafana_data: