# ============================================================
# Predictive Maintenance System — Docker Compose
# ============================================================

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: docker/airflow/Dockerfile
  env_file: .env
  environment:
    AIRFLOW__CORE__EXECUTOR: ${AIRFLOW__CORE__EXECUTOR}
    AIRFLOW__CORE__LOAD_EXAMPLES: ${AIRFLOW__CORE__LOAD_EXAMPLES}
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    MLFLOW_TRACKING_URI: http://mlflow:5000
    MLFLOW_TRACKING_USERNAME: ${MLFLOW_TRACKING_USERNAME}
    MLFLOW_TRACKING_PASSWORD: ${MLFLOW_TRACKING_PASSWORD}
    PROJECT_ROOT: /app
    PYTHONPATH: /opt/airflow:/app
    UPLOADS_DIR: /app/data/feedback/uploads
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - airflow_db:/opt/airflow            # SHARED volume so all airflow containers see the same SQLite DB
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./src:/app/src
    - ./configs:/app/configs
    - ./data:/app/data
    - ./models:/app/models
  depends_on:
    postgres:
      condition: service_healthy

services:
  # ── Postgres ────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: pm-postgres
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks: [pm-net]

  # ── MLflow ──────────────────────────────────────────────
  mlflow:
    build:
      context: .
      dockerfile: docker/mlflow/Dockerfile
    container_name: pm-mlflow
    env_file: .env
    ports:
      - "5000:5000"
    volumes:
      - mlflow_db:/mlflow/db
      - mlflow_artifacts:/mlflow/artifacts
    restart: unless-stopped
    networks: [pm-net]

  # ── FastAPI Backend ─────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: pm-api
    env_file: .env
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      PYTHONPATH: /app
      RETRAIN_API_KEY: ${RETRAIN_API_KEY}
      CORS_ORIGINS: "http://localhost:${FRONTEND_PORT},http://frontend:8501"
      FEEDBACK_DB_PATH: /app/data/feedback/feedback.db
      FEEDBACK_WINDOW: "100"
      UPLOADS_DIR: /app/data/feedback/uploads
    ports:
      - "${API_PORT}:8000"
    volumes:
      - ./models:/app/models:ro
      - ./data/baselines:/app/data/baselines:ro
      - feedback_data:/app/data/feedback
      - ./configs:/app/configs:ro
    depends_on:
      mlflow:
        condition: service_started
    restart: unless-stopped
    networks: [pm-net]

  # ── Streamlit Frontend ──────────────────────────────────
  # Always runs on 8501 INSIDE the container.
  # FRONTEND_PORT maps the HOST port (e.g. 3000→8501).
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: pm-frontend
    env_file: .env
    environment:
      API_URL: http://api:8000
      MLFLOW_URL: http://mlflow:5000
      AIRFLOW_URL: http://airflow-webserver:8080
      GRAFANA_URL: http://grafana:3000
      PROMETHEUS_URL: http://prometheus:9090
    ports:
      - "${FRONTEND_PORT}:8501"
    depends_on:
      - api
    restart: unless-stopped
    networks: [pm-net]

  # ── Airflow ─────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: pm-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username "${AIRFLOW_ADMIN_USERNAME}" \
          --password "${AIRFLOW_ADMIN_PASSWORD}" \
          --firstname Admin --lastname User --role Admin \
          --email admin@example.com || true
    restart: "no"
    networks: [pm-net]

  airflow-webserver:
    <<: *airflow-common
    container_name: pm-airflow-web
    command: airflow webserver --port 8080
    ports:
      - "${AIRFLOW_PORT}:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks: [pm-net]

  airflow-scheduler:
    <<: *airflow-common
    container_name: pm-airflow-scheduler
    command: airflow scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped
    networks: [pm-net]

  # ── Prometheus ──────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.48.1
    container_name: pm-prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT}:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    depends_on:
      - api
    restart: unless-stopped
    networks: [pm-net]

  # ── Grafana ─────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.2.3
    container_name: pm-grafana
    env_file: .env
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT}:3000"
    depends_on:
      - prometheus
    restart: unless-stopped
    networks: [pm-net]

networks:
  pm-net:
    driver: bridge

volumes:
  postgres_data:
  mlflow_db:
  mlflow_artifacts:
  feedback_data:
  prometheus_data:
  grafana_data:
  airflow_db:       # Shared volume for Airflow SQLite DB